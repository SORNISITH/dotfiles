[plugin]
prepend_previewers = [
  { url = "*/", run = "eza-preview" },
  { url = "*.tar*", run = 'piper --format=url -- tar tf "$1"' },
  { url = "*.csv", run = 'piper -- bat -p --color=always "$1"' },
  { url = "*.md", run = 'piper -- CLICOLOR_FORCE=1 glow -w=$w -s=dark "$1"' },
  { name = "*.{bin,exe}", run = "hevi" },
]


[manager]
show_hidden = true

[opener]
pdf = [{ run = 'zathura "$@"', desc = "Open PDF" }]
edit = [{ run = 'nvim "$@"', block = true, desc = "Open in Neovim" }]

[open]
rules = [
  { mime = "application/pdf", use = "pdf" },
  { mime = "text/*", use = "edit" },
  # Fallback → everything else
  { name = "*", use = "open" },
]
